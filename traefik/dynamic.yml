tls:
  certificates:
    - certFile: /certs/coupedeluniversite.pem
      keyFile: /certs/coupedeluniversite.key
  
  stores:
    default:
      defaultCertificate:
        certFile: /certs/coupedeluniversite.pem
        keyFile: /certs/coupedeluniversite.key

  options:
    default:
      minVersion: VersionTLS12
      # On retire les cipherSuites manuels pour éviter les erreurs de frappe
      # Traefik utilisera ses valeurs sécurisées par défaut

http:
  middlewares:
    api-rate-limit:
      rateLimit:
        # Limite par IP : 30 req/s en régime normal, jusqu'à 60 en burst
        # Les connexions SSE ne comptent qu'une seule fois (connexion longue durée)
        average: 30
        burst: 60
    security-headers:
      headers:
        stsSeconds: 31536000
        contentTypeNosniff: true
        browserXssFilter: true